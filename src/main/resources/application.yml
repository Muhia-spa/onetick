spring:
  application:
    name: onetick
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/onetick}
    username: ${DB_USERNAME:onetick}
    password: ${DB_PASSWORD:onetick}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:user@example.com}
    password: ${MAIL_PASSWORD:change-me}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: ${CACHE_REDIS_TTL_MS:60000}
      enable-statistics: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  oidc:
    auth0:
      enabled: ${APP_OIDC_AUTH0_ENABLED:false}
      domain: ${APP_OIDC_AUTH0_DOMAIN:}
      client-id: ${APP_OIDC_AUTH0_CLIENT_ID:}
      client-secret: ${APP_OIDC_AUTH0_CLIENT_SECRET:}
      audience: ${APP_OIDC_AUTH0_AUDIENCE:}
      redirect-uri: ${APP_OIDC_AUTH0_REDIRECT_URI:http://localhost:8080/api/v1/auth/oidc/callback}
      scopes: ${APP_OIDC_AUTH0_SCOPES:openid profile email}
      group-claim: ${APP_OIDC_AUTH0_GROUP_CLAIM:groups}
      state-ttl-ms: ${APP_OIDC_AUTH0_STATE_TTL_MS:300000}
      group-role-mapping:
        onetick-admin: ADMIN
        onetick-manager: MANAGER
        onetick-team-lead: TEAM_LEAD
  reminders:
    hours-before-deadline: ${APP_REMINDER_HOURS_BEFORE_DEADLINE:24}
    cron: ${APP_REMINDER_CRON:0 0 * * * *}
  notifications:
    queue:
      backend: ${APP_NOTIFICATIONS_QUEUE_BACKEND:redis}
      key: ${APP_NOTIFICATIONS_QUEUE_KEY:onetick:notifications}
      dlq-key: ${APP_NOTIFICATIONS_QUEUE_DLQ_KEY:onetick:notifications:dlq}
      poll-ms: ${APP_NOTIFICATIONS_QUEUE_POLL_MS:2000}
      max-batch: ${APP_NOTIFICATIONS_QUEUE_MAX_BATCH:50}
      max-retries: ${APP_NOTIFICATIONS_QUEUE_MAX_RETRIES:3}
      backoff-base-ms: ${APP_NOTIFICATIONS_QUEUE_BACKOFF_BASE_MS:2000}
      backoff-max-ms: ${APP_NOTIFICATIONS_QUEUE_BACKOFF_MAX_MS:30000}
  jwt:
    secret: ${APP_JWT_SECRET:change-this-to-a-strong-secret-with-64-chars-minimum}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:60}
  bootstrap:
    admin:
      enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
      email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@onetick.local}
      name: ${APP_BOOTSTRAP_ADMIN_NAME:Onetick Admin}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:admin12345}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSX} %-5level [%X{correlationId}] %logger{36} - %msg%n"
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    enable:
      cache: true
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
